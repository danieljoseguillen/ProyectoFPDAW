spring.application.name=proyectohotelgalicia
spring.thymeleaf.cache=false
server.port=9000

# H2
spring.datasource.url=jdbc:h2:file:./myBD
spring.jpa.hibernate.ddl-auto = create
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.h2.console.enabled=true

#configuración envio de ficheros
spring.servlet.multipart.max-file-size=1024KB
spring.servlet.multipart.max-request-size=1024KB 

# ResposeStatusException
server.error.include-message=always
server.error.include-stacktrace=never