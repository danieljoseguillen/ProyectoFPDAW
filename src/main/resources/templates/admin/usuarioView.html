<!DOCTYPE html>
<html lang="en">

<head th:insert="~{/fragments.html::cabecera}">
    <title>Hoteles Galicia: Perfil de usuario</title>
</head>

<body>
    <header th:replace="~{/fragments.html::logo}"></header>
    <nav th:replace="~{/fragments.html::navbar}"></nav>
    <main id="inicio" class="w-100">
        <div class="opciones border mt-3 container-sm p-3 rounded">
            <h4>Opciones</h4>
            <div class="panelops">
                <a th:href="@{/admin/users/{id}/edit (id=${userid})}" class="btn btn-info">Modificar Datos</a>
                <a th:href="@{/admin/users/{id}/password (id=${userid})}" class="btn btn-info">Actualizar contraseña</a>
                <form th:action="@{/admin/users/{id}/status(id=${userid})}" method="post">
                    <button type="submit" class="btn btn-warning" th:text="${usuario.estado ? 'Desactivar' : 'Activar'}">
                    </button>
                </form>
                <a th:href="@{/admin/users/{id}/reviews (id=${userid})}" class="btn btn-info ">Ver reseñas</a>
                <a th:href="@{/admin/users}" class="btn btn-info">Volver</a>
            </div>
        </div>
        <div class="container my-3 border align-self-start p-3 rounded mw-100">
            <h3 class="mb-5">Datos Personales:</h3>
            <div class="profilecell">
                <div class="proflabel">
                    <p class="fs-5">Nombre</p>
                </div>
                <div class="proftext">
                    <p th:text="${usuario.nombre + ' ' + usuario.apellido}"></p>
                </div>
            </div>
            <div class="profilecell">
                <div class="proflabel">
                    <p class="fs-5">Correo</p>
                </div>
                <div class="proftext">
                    <p th:text="${usuario.correo}"></p>
                </div>
            </div>
            <div class="profilecell">
                <div class="proflabel">
                    <p class="fs-5">Telefono</p>
                </div>
                <div class="proftext">
                    <p th:text="${usuario.telefono}"></p>
                </div>
            </div>
            <div class="profilecell">
                <div class="proflabel">
                    <p class="fs-5">Estado</p>
                </div>
                <div class="proftext">
                    <p th:text="${usuario.estado ? 'Activo' :'Inactivo'}"></p>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{/fragments.html::pie}"></footer>
    <div th:replace="~{/fragments.html::alertas}"></div>

</body>

</html>
