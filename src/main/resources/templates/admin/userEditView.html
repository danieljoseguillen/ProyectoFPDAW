<!DOCTYPE html>
<html lang="en">

<head th:insert="~{/fragments.html::cabecera}">
    <title>Hoteles Galicia</title>
</head>

<body>
    <header th:replace="~{/fragments.html::logo}"></header>
    <nav th:replace="~{/fragments.html::navbar}"></nav>
    <main>
        <div>
            <h2 class="my-4">Modificación de datos de usuario:</h2>
            <form class="row g-3 formregistro" method="post" action="#" th:action="@{/admin/users/edit/submit}"
                th:object="${cliente}">
                <div class="col-md-12">
                    <label for="correo" class="form-label"><b>Correo</b> </label>
                    <input type="email" class="form-control" th:field="*{correo}" id="correo">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}">
                    </div>
                </div>
                <div class="col-md-12">
                    <label for="nombre" class="form-label"><b>Nombre</b> </label>
                    <input type="text" class="form-control" th:field="*{nombre}" id="nombre">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">
                    </div>
                </div>
                <div class="col-md-12">
                    <label for="apellido" class="form-label"><b>Apellidos</b> </label>
                    <input type="text" class="form-control" th:field="*{apellido}" id="apellido">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('apellido')}"
                        th:errors="*{apellido}">
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="telefono" class="form-label"><b>Telefono</b> </label>
                    <input type="tel" class="form-control" th:field="*{telefono}" id="telefono">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('telefono')}"
                        th:errors="*{telefono}">
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                    <button type="reset" class="btn btn-info">Reestablecer</button>
                    <a class="btn btn-primary" th:href="@{/admin/users/{id} (id=${userid})}">Volver</a>
                </div>
            </form>
        </div>
        </div>
    </main>
    <footer th:replace="~{/fragments.html::pie}"></footer>
        <div th:replace="~{/fragments.html::alertas}"></div>
</body>

</html>
