<!DOCTYPE html>
<html lang="en">

<head th:insert="~{/fragments.html::cabecera}">
    <title>Hoteles Galicia</title>
</head>

<body>
    <header th:replace="~{/fragments.html::logo}"></header>
    <nav th:replace="~{/fragments.html::navbar}"></nav>
    <main>
        <div>
            <h2 class="my-4">Modificación de datos de empresa:</h2>
            <form class="row g-3 formregistro" method="post" action="#" th:action="@{/admin/enterprises/edit/submit}"
                th:object="${empresa}">
                <div class="col-md-12">
                    <label for="cif" class="form-label"><b>C.I.F</b> </label>
                    <input type="text" class="form-control" th:field="*{cif}" id="cif">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('cif')}" th:errors="*{cif}">
                    </div>
                </div>
                <div class="col-md-12">
                    <label for="razonSocial" class="form-label"><b>Razón Social</b> </label>
                    <input type="text" class="form-control" th:field="*{razon}" id="razonSocial">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('razon')}"
                        th:errors="*{razon}">
                    </div>
                </div>
                <div class="col-md-12">
                    <label for="correo" class="form-label"><b>Correo</b> </label>
                    <input type="email" class="form-control" th:field="*{correo}" id="correo">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}">
                    </div>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Actualizar</button>
                    <button type="reset" class="btn btn-info">Reestablecer</button>
                    <a class="btn btn-primary" th:href="@{/admin/enterprises/{id} (id=${userid})}">Volver</a>

                </div>
            </form>
        </div>
        </div>
    </main>
    <footer th:replace="~{/fragments.html::pie}"></footer>
    <div th:replace="~{/fragments.html::alertas}"></div>
</body>

</html>
