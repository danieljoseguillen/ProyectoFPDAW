<!DOCTYPE html>
<html lang="en">

<head th:insert="~{/fragments.html::cabecera}">
    <title>Hoteles Galicia</title>
</head>

<body>
    <header th:replace="~{/fragments.html::logo}"></header>
    <nav th:replace="~{/fragments.html::navbar}"></nav>
    <main>
        <div class="w-100">
            <h3 class="mb-4">Lista de usuarios</h3>
            <form method="get" action="#" th:action="@{/admin/users}" th:object="${sortform}">
                <div class="form-group d-flex flex-row flex-wrap">
                    <input class="btn btn-primary" type="submit" value="Buscar">
                    <input type="text" th:field="*{sortname}" class="form-control-sm">
                    <div class="mx-3 align-self-center">
                        <input type="radio" class="form-check-input" name="sorttype" value="NOMBRE" checked>
                        <label class="form-check-label" for="sorttype">Nombre</label>
                    </div>
                    <div class="mx-3 align-self-center">
                        <input type="radio" class="form-check-input" name="sorttype" value="CORREO">
                        <label class="form-check-label" for="sorttype">Correo</label>
                    </div>
                    <a class="btn btn-primary" th:href="@{/admin/users}">Reestablecer</a>
                </div>
            </form>
            <div th:each="user:${listado}" class="item-card border rounded-3 my-3">
                <div class="card-col-user">
                    <h5>Usuario</h5>
                    <p th:text="${user.nombre+' '+user.apellido}"></p>
                </div>
                <div class="card-col-content">
                    <h5>Correo</h5>
                    <p th:text="${user.correo}"></p>
                </div>
                <div class="card-col-stat hide600">
                    <h5>Telefono</h5>
                    <p th:text="${user.telefono}"></p>
                </div>
                <div class="card-col-stat">
                    <h5>Estado</h5>
                    <p th:text="${user.estado} ?'Activo' :'Inactivo'"></p>
                </div>
                <a class="card-col-info card-col-lone" th:href="@{/admin/users/{id} (id=${user.id})}">
                    <i class="bi  bi-info-square-fill"></i>
                </a>
            </div>
        </div>
        <div th:if="${listado.size() == 0}" class="w-100 h-100 mainlist d-flex flex-column">
            <h2 class="my-auto text-center p-5">No se encontraron resultados.</h2>
        </div>
        <nav th:if="${totalPages > 1}" class="mt-4 paginador">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/admin/users(page=${currentPage - 1}, sortname=${sortform.sortname}, sorttype=${sortform.sorttype})}">Anterior</a>
                </li>

                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                        th:href="@{/admin/users(page=${i}, sortname=${sortform.sortname}, sorttype=${sortform.sorttype})}"
                        th:text="${i + 1}"></a>
                </li>

                <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/admin/users(page=${currentPage + 1}, sortname=${sortform.sortname}, sorttype=${sortform.sorttype})}">Siguiente</a>
                </li>
            </ul>
        </nav>
    </main>
    <footer th:replace="~{/fragments.html::pie}"></footer>
    <div th:replace="~{/fragments.html::alertas}"></div>
</body>

</html>
