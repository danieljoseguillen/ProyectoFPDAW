<!DOCTYPE html>
<html lang="en">
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="cabecera">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</th:block>

<body>
    <header th:fragment="logo">
        <a th:href="@{/}">
            <h2>HotelesGalicia.com</h2>
        </a>
    </header>

    <nav th:fragment="navbar" class="navbar navbar-expand-md">
        <div class="container-fluid">
            <div class="navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" aria-current="page" th:href="@{/}">Hoteles</a></li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN')"><a class="nav-link" aria-current="page"
                            th:href="@{/admin/users}">Usuarios</a></li>
                    <li sec:authorize="hasAnyRole('USER')" class="nav-item"><a class="nav-link" aria-current="page"
                            th:href="@{/user/reserves}">Mis Reservas</a></li>
                    <li sec:authorize="hasAnyRole('USER')" class="nav-item"><a class="nav-link" aria-current="page"
                            th:href="@{/user/valorations}">Mis Reseñas</a></li>
                    <li sec:authorize="hasAnyRole('CORPO')" class="nav-item"><a class="nav-link" aria-current="page"
                            th:href="@{/enterprise/hotels}">Mis establecimientos</a></li>
                    <li class="nav-item ms-md-auto dropdown ajuste" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" id="dropdownMenuLink"
                            data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <span th:text="${usuarioactual}"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownMenuLink">
                            <li>
                                <a class="dropdown-item" sec:authorize="hasAnyRole('ADMIN')"
                                    th:href="@{/admin/profile}">Mis datos</a>
                                <a class="dropdown-item" sec:authorize="hasAnyRole('USER')"
                                    th:href="@{/user/profile}">Mis datos</a>
                                <a class="dropdown-item" sec:authorize="hasAnyRole('CORPO')"
                                    th:href="@{/enterprise/profile}">Mis datos</a>
                            </li>
                            <li><a class="dropdown-item" th:href="@{/logout}">Cerrar sesión</a></li>
                        </ul>
                    </li>

                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/register}">Registrarse</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/login}">Iniciar sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <footer th:fragment="pie">
        <p class="center">Pagina creada por Daniel Guillen. <span class="right">©<span th:text="${anno}"></span></span>
        </p>
    </footer>
</body>

</html>
