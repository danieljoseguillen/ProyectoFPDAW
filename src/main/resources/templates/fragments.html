    <meta charset="utf-8">

<body>

        <a th:href="@{/}">

    </header>

    <nav th:fragment="navbar" class="navbar navbar-expand-md">
        <div class="container-fluid">
            <div class="navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" aria-current="page" th:href="@{/}">Inicio</a></li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN')"><a class="nav-link" aria-current="page"
                            th:href="@{/admin/users}">Usuarios</a></li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN')"><a class="nav-link" aria-current="page"
                            th:href="@{/admin/enterprises}">Empresas</a></li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN')"><a class="nav-link" aria-current="page"
                            th:href="@{/admin/hotels}">Hoteles</a></li>
                    <li sec:authorize="hasAnyRole('USER')" class="nav-item"><a class="nav-link" aria-current="page"
                            th:href="@{/user/reserves}">Mis Reservas</a></li>
                    <li sec:authorize="hasAnyRole('USER')" class="nav-item"><a class="nav-link" aria-current="page"
                            th:href="@{/user/valorations}">Mis Reseñas</a></li>
                    <li sec:authorize="hasAnyRole('CORPORATION')" class="nav-item"><a class="nav-link"
                            aria-current="page" th:href="@{/enterprise/hotels}">Mis establecimientos</a></li>
                    <li class="nav-item ms-md-auto dropdown ajuste" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" role="button" id="dropdownMenuLink"
                            data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <span th:text="${usuarioactual}"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownMenuLink">
                            <li>
                                <a class="dropdown-item" sec:authorize="hasAnyRole('ADMIN')"
                                    th:href="@{/admin/profile}">Mis datos</a>
                                <a class="dropdown-item" sec:authorize="hasAnyRole('USER')"
                                    th:href="@{/user/profile}">Mis datos</a>
                                <a class="dropdown-item" sec:authorize="hasAnyRole('CORPORATION')"
                                    th:href="@{/enterprise/profile}">Mis datos</a>
                            </li>
                            <li><a class="dropdown-item" th:href="@{/logout}">Cerrar sesión</a></li>
                        </ul>
                    </li>

                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/register}">Registrarse</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/login}">Iniciar sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <footer th:fragment="pie">
        <p class="center">Pagina creada por Daniel Guillen. <span class="right">©<span th:text="${anno}"></span></span>
        </p>
    </footer>

    <th:block th:fragment="alertas">
        <div class="alert-container position-fixed top-0 end-0 p-3" data-bs-delay="5000" data-bs-autohide="true"
            style="z-index: 9999;">

            <!-- Mensaje de éxito -->
            <div th:if="${message}"
                class="alert alert-success alert-dismissible fade show shadow-lg rounded-3 mb-3 floating-alert"
                role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Mensaje de error -->
            <div th:if="${error}"
                class="alert alert-danger alert-dismissible fade show shadow-lg rounded-3 mb-3 floating-alert"
                role="alert">
                <i class="bi bi-exclamation-octagon-fill me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Advertencia -->
            <div th:if="${warning}"
                class="alert alert-warning alert-dismissible fade show shadow-lg rounded-3 mb-3 floating-alert"
                role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${warning}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Info -->
            <div th:if="${info}"
                class="alert alert-info alert-dismissible fade show shadow-lg rounded-3 mb-3 floating-alert"
                role="alert">
                <i class="bi bi-info-circle-fill me-2"></i>
                <span th:text="${info}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <script th:src="@{/js/alertas.js}"></script>
    </th:block>
</body>
