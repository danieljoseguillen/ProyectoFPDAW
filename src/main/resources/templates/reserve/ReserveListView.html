<!DOCTYPE html>
<html lang="en">

<head th:insert="~{/fragments.html::cabecera}">
    <title>Hoteles Galicia</title>
</head>

<body>
    <header th:replace="~{/fragments.html::logo}"></header>
    <nav th:replace="~{/fragments.html::navbar}"></nav>
    <main class="w-75">
        <div>
            <h3 sec:authorize="hasAnyRole('ADMIN')" class="mb-4">Reservas de <span th:text="${nombre}"></span>
            </h3>
             <a th:if="${type == 'hotels'}" th:href="@{/hotel/{id} (id=${typeid})}" class="btn btn-primary me-auto">Volver</a>
        <a th:if="${type == 'users'}" th:href="@{/admin/users/{id} (id=${typeid})}" class="btn btn-primary me-auto">Volver</a>
        </div>

        <h3 sec:authorize="hasAnyRole('CORPORATION')" class="mb-4">Reservas de <span th:text="${hotel.nombre}"></span>
        </h3>
        <a sec:authorize="hasAnyRole('CORPORATION')" th:href="@{/enterprise/hotels/{id} (id=${hotel.id})}"
            class="btn btn-primary me-auto">Volver</a>
        <div class="w-100">
            <div th:each="rese:${reservas}" class="item-card d-flex flex-row border rounded-3 my-3">
                <div class="card-col-primary">
                    <p class="fw-bold">Hotel</p>
                    <p><a th:href="@{/hotel/{id} (id=${rese.hotel.id})}" th:text="${rese.hotel.nombre}"></a></p>
                </div>
                <div class="card-col-secondary">
                    <p class="fw-bold">Fechas</p>
                    <p class="card-date" th:text="${#temporals.format(rese.fechaInicio, 'dd MMM yyyy')}"></p>
                    <p class="card-date" th:text="${#temporals.format(rese.fechaFin, 'dd MMM yyyy')}"></p>
                </div>
                <div class="card-col-stat">
                    <!-- <p class="fw-bold hideable-list-header">Personas</p> -->
                    <p class="icon-header-small-screen" title="Personas">
                        <i class="bi bi-person-standing"></i>
                    </p>
                    <p class="" th:text="${rese.personas}"></p>
                </div>
                <div class="card-col-stat">
                    <!-- <p class="fw-bold hideable-list-header">Habitaciones</p> -->
                    <p class="icon-header-small-screen" title="Habitaciones"><i class="bi bi-door-open"></i></p>
                    <p class="" th:text="${rese.habitacionestotal}"></p>
                </div>
                <div class="card-col-stat">
                    <p class="fw-bold">Total</p>
                    <p th:text="'€ ' + ${#numbers.formatDecimal(rese.costototal,0,0)}"></p>
                </div>
                <div class="card-col-secondary">
                    <p class="fw-bold">Estado</p>
                    <p th:text="${rese.estado}"></p>
                </div>
                <div sec:authorize="hasAnyRole('ADMIN')" class="card-col-options">
                    <div class="card-col-info">
                        <a
                            th:href="@{/admin/{type}/{typeid}/reserves/{idre} (type=${type},typeid=${typeid},idre=${rese.id})}">
                            <i class="bi  bi-info-square-fill"></i></a>
                    </div>
                </div>
                <div sec:authorize="hasAnyRole('CORPORATION')" class="card-col-options">
                    <div class="card-col-info">
                        <a th:href="@{/enterprise/hotels/{id}/reserves/{idre} (id=${rese.hotel.id},idre=${rese.id})}">
                            <i class="bi  bi-info-square-fill"></i></a>
                    </div>
                </div>
                <div sec:authorize="hasAnyRole('USER')" class="card-col-options">
                    <a class="card-col-info" th:href="@{/user/reserves/{id} (id=${rese.id})}">
                        <i class="bi  bi-info-square-fill"></i>
                    </a>
                    <form th:if="${rese.estado.name() != 'CANCELADA' && rese.estado.name() != 'FINALIZADA'}"
                        th:action="@{/user/reserves/cancel}" method="post"
                        onsubmit="return confirm('Está seguro que desea cancelar la reserva?')" class="card-col-action">
                        <input type="hidden" name="id" th:value="${rese.id}" />
                        <button type="submit" class="btn btn-link p-0"><i class="bi bi-x-lg"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{/fragments.html::pie}"></footer>
    <div th:replace="~{/fragments.html::alertas}"></div>
</body>

</html>
